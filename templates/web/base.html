<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Mini Booking{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="/web-static/web/styles.css" />
</head>
<body>
  <header class="site-header">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/">Mini Booking</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
          aria-controls="mainNavbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="/" data-i18n="navRooms">Available Rooms</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/my-bookings" data-i18n="navBookings">My Bookings</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/settings" data-i18n="navSettings">Settings</a>
            </li>
          </ul>
          <div class="d-flex align-items-center gap-2">
            <span id="auth-indicator" class="badge text-bg-secondary" data-i18n="loggedOut">Logged out</span>
            <button id="header-login-btn" class="btn btn-outline-light btn-sm" type="button" data-bs-toggle="modal" data-bs-target="#headerLoginModal" data-i18n="login">
              Login
            </button>
            <button id="header-logout-btn" class="btn btn-warning btn-sm d-none" type="button" data-i18n="logout">
              Logout
            </button>
          </div>
        </div>
      </div>
    </nav>
  </header>

  {% block content %}{% endblock %}

  <div class="modal fade" id="headerLoginModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" data-i18n="login">Login</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="header-login-form">
          <div class="modal-body">
            <div class="mb-3">
              <label for="header-username" class="form-label" data-i18n="userLabel">Username or email</label>
              <input id="header-username" class="form-control" type="text" required />
            </div>
            <div class="mb-3">
              <label for="header-password" class="form-label" data-i18n="passLabel">Password</label>
              <input id="header-password" class="form-control" type="password" required />
            </div>
            <p id="header-login-status" class="status mb-0"></p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="cancel">Cancel</button>
            <button type="submit" class="btn btn-primary" data-i18n="login">Login</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="/web-static/web/i18n.js"></script>
  <script src="/web-static/web/header.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
