{% extends "web/base.html" %}
{% block title %}Settings – Mini Booking{% endblock %}

{% block content %}
<main class="container py-5" style="max-width: 640px;">
  <h1 class="mb-1" data-i18n="settingsTitle">Settings</h1>
  <p class="text-muted mb-4" data-i18n="settingsSub">Manage your preferences.</p>

  <div id="settings-login-alert" class="alert alert-warning" role="alert" data-i18n="loginToSettings">
    Login first to manage your settings.
  </div>

  <div id="settings-panel" class="d-none">
    <div class="card shadow-sm">
      <div class="card-body">
        <h5 class="card-title mb-3" data-i18n="settingsFeatures">Features</h5>

        <div class="form-check form-switch mb-3">
          <input class="form-check-input" type="checkbox" role="switch" id="setting-premium-i18n" />
          <label class="form-check-label" for="setting-premium-i18n">
            <strong data-i18n="premiumI18nLabel">Translated responses</strong>
            <br />
            <small class="text-muted" data-i18n="premiumI18nDesc">
              When enabled, the AI concierge responds in the same language as your query. Cards, messages, and suggestions are all translated.
            </small>
          </label>
        </div>

        <hr />
        <div class="d-flex justify-content-end">
          <button id="settings-save" class="btn btn-primary" data-i18n="settingsSave">Save settings</button>
        </div>
        <p id="settings-status" class="status mt-2 mb-0"></p>
      </div>
    </div>
  </div>
</main>
{% endblock %}

{% block scripts %}
<script src="/web-static/web/settings.js"></script>
{% endblock %}
